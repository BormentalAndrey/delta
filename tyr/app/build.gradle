plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// ── Version control ───────────────────────────────────────────────────────────
// Release: bump for production releases (IzzyOnDroid / F-Droid)
def RELEASE_VERSION_CODE = 28
def RELEASE_VERSION_NAME = "1.8.1"

// Dev (signed debug): bump independently of release
def DEV_VERSION_CODE = 28
def DEV_VERSION_NAME = "1.8.1-dev"
// ─────────────────────────────────────────────────────────────────────────────

android {
    namespace 'com.jbselfcompany.tyr'
    compileSdk 36

    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }

    defaultConfig {
        applicationId "com.jbselfcompany.tyr"
        minSdk 23
        targetSdk 33
        versionCode RELEASE_VERSION_CODE
        versionName RELEASE_VERSION_NAME
        resourceConfigurations += ['en', 'ru']
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    splits {
        abi {
            enable true
            reset()
            include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            universalApk true
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".dev"
            manifestPlaceholders = [appLabel: "Tyr-dev"]
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        release {
            manifestPlaceholders = [appLabel: "Tyr"]
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging false
        }
        resources {
            excludes += [
                    'org/bouncycastle/pqc/crypto/picnic/*.*',
                    'META-INF/*.version',
                    'META-INF/*.SF',
                    'META-INF/*.RSA',
                    'META-INF/*.DSA',
                    'META-INF/LICENSE*',
                    'META-INF/**/LICENSE*',
                    'META-INF/NOTICE*',
                    'META-INF/DEPENDENCIES'
            ]
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def abiName = output.getFilter(com.android.build.OutputFile.ABI) ?: "universal"
            if (variant.buildType.name == 'debug') {
                output.versionCodeOverride = DEV_VERSION_CODE
                output.versionNameOverride = DEV_VERSION_NAME
                outputFileName = "Tyr-${DEV_VERSION_NAME}-${abiName}.apk"
            } else {
                outputFileName = "Tyr-${variant.versionName}-${abiName}.apk"
            }
        }
    }
}

dependencies {
    // Yggmail library
    implementation fileTree(include: ['*.aar'], dir: 'libs')

    // AndroidX libraries
    implementation 'androidx.core:core-ktx:1.17.0'
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
    implementation 'androidx.preference:preference-ktx:1.2.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'com.google.android.material:material:1.13.0'
    implementation 'androidx.viewpager2:viewpager2:1.1.0'

    // Security - Encrypted SharedPreferences
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // EXIF metadata for image rotation correction
    implementation 'androidx.exifinterface:exifinterface:1.3.7'

    // QR Code generation
    implementation 'com.google.zxing:core:3.5.3'

    // QR Code scanning (camera-based)
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.7.0'
}
