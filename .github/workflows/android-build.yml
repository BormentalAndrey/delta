name: Android CI Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta/jni/deltachat-core-rust

      - name: Get deltachat-core-rust submodule hash
        id: core-hash
        run: echo "hash=$(git rev-parse HEAD:delta/jni/deltachat-core-rust)" >> $GITHUB_OUTPUT

      - name: Cache compiled core
        id: cache-core
        uses: actions/cache@v4
        with:
          path: |
            delta/jni/arm64-v8a
            delta/jni/x86_64
            delta/libs/arm64-v8a
            delta/libs/x86_64
          key: core-${{ steps.core-hash.outputs.hash }}-ndk-r27

      - name: Compile DeltaChat native libraries
        if: steps.cache-core.outputs.cache-hit != 'true'
        working-directory: delta
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x scripts/ndk-make.sh scripts/install-toolchains.sh
          export PATH="${PATH}:${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/"
          scripts/install-toolchains.sh
          scripts/ndk-make.sh

      - name: Copy .so files to libs
        working-directory: delta
        run: |
          mkdir -p libs
          for ABI in arm64-v8a x86_64; do
            if [ -d "jni/$ABI" ]; then
              mkdir -p "libs/$ABI"
              cp -v "jni/$ABI"/*.so "libs/$ABI/" 2>/dev/null || true
            fi
          done
          echo "=== Compiled .so files ==="
          find libs jni -name "*.so" -type f | sort

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Check APK contents
        run: |
          echo "=== .so files in APK ==="
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep "\.so$" || echo "NO .so FILES FOUND!"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
