name: Android CI Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize and verify submodules
        run: |
          echo "=== Setting up submodules ==="
          cd delta
          if [ -d "jni/deltachat-core-rust" ] && [ ! -f "jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Removing empty submodule directory..."
            rm -rf jni/deltachat-core-rust
          fi
          if [ -f ".gitmodules" ]; then
            git submodule update --init --recursive
          fi
          if [ ! -f "jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Adding submodule..."
            git submodule add https://github.com/deltachat/deltachat-core-rust.git jni/deltachat-core-rust 2>/dev/null || true
            git submodule update --init --recursive
          fi
          cd ..
          echo "=== Git submodules status ==="
          git submodule status
          echo "=== Verifying submodule ==="
          if [ -f "delta/jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Submodule OK"
            ls -la delta/jni/deltachat-core-rust/
          else
            echo "ERROR: Failed to initialize submodule"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta/jni/deltachat-core-rust

      - name: Get deltachat-core-rust submodule hash
        id: core-hash
        run: |
          if [ -f "delta/jni/deltachat-core-rust/Cargo.toml" ]; then
            HASH=$(git rev-parse HEAD:delta/jni/deltachat-core-rust 2>/dev/null || echo "unknown")
          else
            HASH="no-submodule"
          fi
          echo "Core hash: $HASH"
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache compiled core
        id: cache-core
        uses: actions/cache@v4
        with:
          path: |
            delta/jni/arm64-v8a
            delta/jni/x86_64
            delta/libs/arm64-v8a
            delta/libs/x86_64
          key: core-${{ steps.core-hash.outputs.hash }}-ndk-r27

      - name: Compile DeltaChat native libraries
        if: steps.cache-core.outputs.cache-hit != 'true'
        working-directory: delta
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "=== Verifying submodule ==="
          if [ ! -f "jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "ERROR: Submodule not found!"
            exit 1
          fi
          
          echo "=== Building native libraries ==="
          chmod +x scripts/ndk-make.sh
          echo "stable" > scripts/rust-toolchain
          ./scripts/ndk-make.sh
          
          echo "=== Build output ==="
          find jni -name "*.so" -type f | sort

      - name: Copy .so files to libs
        working-directory: delta
        run: |
          mkdir -p libs
          for ABI in arm64-v8a x86_64; do
            if [ -d "jni/$ABI" ] && [ "$(ls -A jni/$ABI/*.so 2>/dev/null)" ]; then
              mkdir -p "libs/$ABI"
              cp -v "jni/$ABI"/*.so "libs/$ABI/"
              echo "Copied $ABI: $(ls jni/$ABI/*.so | wc -l) files"
            else
              echo "WARNING: No .so files found for $ABI"
            fi
          done
          echo "=== Final libs structure ==="
          find libs -type f | sort

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Check APK contents
        run: |
          echo "=== .so files in APK ==="
          APK=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -f "$APK" ]; then
            unzip -l "$APK" | grep "\.so$" || echo "NO .so FILES FOUND!"
            echo "=== APK size ==="
            ls -lh "$APK"
          else
            echo "APK not found!"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
