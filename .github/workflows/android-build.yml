name: Android CI Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize and verify submodules
        run: |
          echo "=== Setting up submodules ==="
          cd delta
          if [ -d "jni/deltachat-core-rust" ] && [ ! -f "jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Removing empty submodule directory..."
            rm -rf jni/deltachat-core-rust
          fi
          if [ -f ".gitmodules" ]; then
            git submodule update --init --recursive
          fi
          if [ ! -f "jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Adding submodule..."
            git submodule add https://github.com/deltachat/deltachat-core-rust.git jni/deltachat-core-rust 2>/dev/null || true
            git submodule update --init --recursive
          fi
          cd ..
          
          echo "=== Verifying submodule ==="
          if [ -f "delta/jni/deltachat-core-rust/Cargo.toml" ]; then
            echo "Submodule OK"
          else
            echo "ERROR: Failed to initialize submodule"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta/jni/deltachat-core-rust

      # ШАГ ДЕКОДИРОВАНИЯ КЛЮЧА (ОБЯЗАТЕЛЬНО)
      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.BASE64_KEYSTORE }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "Warning: BASE64_KEYSTORE is empty. Skipping decode."
          else
            echo "$ENCODED_KEYSTORE" | base64 --decode > app/my-release-key.jks
            echo "Keystore decoded to app/my-release-key.jks"
          fi

      - name: Get core hash for cache
        id: core-hash
        run: |
          HASH=$(git rev-parse HEAD:delta/jni/deltachat-core-rust 2>/dev/null || echo "nosubmodule")
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache compiled native core
        id: cache-core
        uses: actions/cache@v4
        with:
          path: |
            delta/jni/arm64-v8a
            delta/jni/x86_64
            delta/libs/arm64-v8a
            delta/libs/x86_64
          key: core-${{ steps.core-hash.outputs.hash }}-ndk-r27

      - name: Compile DeltaChat native libraries
        if: steps.cache-core.outputs.cache-hit != 'true'
        working-directory: delta
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x scripts/ndk-make.sh
          echo "stable" > scripts/rust-toolchain
          ./scripts/ndk-make.sh

      - name: Copy .so files to libs
        working-directory: delta
        run: |
          mkdir -p libs
          for ABI in arm64-v8a x86_64; do
            if [ -d "jni/$ABI" ]; then
              mkdir -p "libs/$ABI"
              cp -v jni/$ABI/*.so libs/$ABI/ 2>/dev/null || true
            fi
          done

      - name: Remove conflicting icons
        run: |
          find tyr -name "ic_launcher*" -delete
          find delta -name "ic_launcher*" -delete

      - name: Build Release APK
        env:
          # Имена исправлены для соответствия вашим секретам и build.gradle.kts
          STORE_PASSWORD: "${{ secrets.STORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleFossRelease --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: delta-release-apk
          path: app/build/outputs/apk/foss/release/*.apk
