#!/bin/bash
echo "=== Очистка всех кэшей ==="

# 1. Остановить Gradle daemon
./gradlew --stop

# 2. Удалить папки сборки
rm -rf app/build
rm -rf delta/build
rm -rf tyr/build
rm -rf build

# 3. Удалить кэш Gradle
rm -rf .gradle

# 4. Удалить глобальный кэш Gradle (осторожно!)
rm -rf ~/.gradle/caches

# 5. Удалить кэш Android Studio (если есть)
rm -rf .idea

echo "=== Готово! Кэш очищен ==="
echo "Запустите: ./gradlew clean assembleFossDebug"
